name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-apk:
    name: Build & Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install NPM Dependencies
        run: |
          npm ci || npm install

      - name: Build React Application (Vite dist)
        run: |
          npm run build

      - name: Setup Capacitor and Sync Android Wrapper
        run: |
          # If the Android folder isn't committed, create it dynamically
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # Synchronize live React build assets with Android package modules
          npx cap sync android

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Android App with Gradle (Debug APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Archive and Upload APK Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Launch-Services-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
