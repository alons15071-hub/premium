name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

env:
  CAPACITOR_TELEMETRY_DISABLED: 1
  CI: true

jobs:
  build-apk:
    name: Build & Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Inject Capacitor into package.json (Clean Dynamic Approach)
        run: |
          # Dynamically add Capacitor dependencies to package.json so the runner resolves them natively
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.dependencies = pkg.dependencies || {};
            pkg.dependencies["@capacitor/core"] = "^6.0.0";
            pkg.dependencies["@capacitor/android"] = "^6.0.0";
            pkg.devDependencies = pkg.devDependencies || {};
            pkg.devDependencies["@capacitor/cli"] = "^6.0.0";
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
          '

      - name: Install NPM Dependencies & Capacitor
        run: |
          npm install --legacy-peer-deps

      - name: Build React Application (Vite dist)
        run: |
          npm run build

      - name: Setup Capacitor and Sync Android Wrapper dynamically
        run: |
          # Turn off telemetry explicitly
          npx cap telemetry off || true
          
          # Create capacitor.config.json file dynamically on the runner
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "pe.smartlaunch.app",
            "appName": "Smart Launch Services",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF
          
          # Initialize Android platform wrapper
          npx cap add android
          
          # Synchronize live React built static assets with the Android package
          npx cap sync android

      - name: Make Gradle Wrapper Executable
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          else
            echo "Error: android/gradlew not found!"
            exit 1
          fi

      - name: Build Android App with Gradle (Debug APK)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Archive and Upload APK Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Launch-Services-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
