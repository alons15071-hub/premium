<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Smart Launch Services</title>
    
    <!-- Meta tags for PWA mobile installation -->
    <meta name="theme-color" content="#001736" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SmartLaunch" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/anchor.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts of Premium Typography Pairings -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <script>
      // Service Worker registration for PWA installability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker cultivado:', reg.scope))
            .catch(err => console.log('SW no cultivado:', err));
        });
      }
    </script>
  </head>
  <body class="bg-[#f9f9fc] antialiased select-none overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
